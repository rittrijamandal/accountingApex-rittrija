<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grader — Accounting APEX</title>
  <link rel="stylesheet" href="auth-ui.css" />
</head>
<body>
  <div class="dashboard dashboard-wide">
    <h1>Grader <span>console</span></h1>
    <p>Signed in as <strong id="email"></strong>. You can browse <strong>published</strong> worlds only and load them into the sample viewer. You cannot create or edit worlds.</p>
    <div class="row" style="margin-bottom:16px">
      <button type="button" class="btn btn-inline" id="logout">Sign out</button>
      <a href="viewer.html" class="btn btn-inline btn-ghost" style="text-decoration:none;display:inline-block">Sample viewer (no world loaded)</a>
      <a href="agent.html" class="btn btn-inline btn-ghost" style="text-decoration:none;display:inline-block">Legacy agent UI</a>
    </div>

    <h2 class="admin-section-title">Published worlds</h2>
    <div id="grader-worlds"><p class="muted">Loading…</p></div>
  </div>
  <script type="module" src="js/grader-app.js"></script>
</body>
</html>
