<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Agent runner — Symbal Accounting Apex</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    html, body { height: 100%; overflow: hidden; background: var(--surface-app); }


    #root { display: flex; flex-direction: column; height: 100vh; }

    /* TOPBAR */
    #topbar {
      display: flex; align-items: center; gap: 12px;

      padding: 0 20px; height: 52px; min-height: 52px; flex-shrink: 0;
      background: var(--surface-card); border-bottom: 1px solid var(--border-default);
      font-size: var(--fs-sm);
    }
    .tb-logo {
      display: inline-flex; align-items: center; gap: 8px;
      font-weight: 600; color: var(--text-primary);
      font-size: 14px; letter-spacing: -0.01em;
      white-space: nowrap; flex-shrink: 0;
    }
    .tb-logo-img { display: block; width: 22px; height: 22px; object-fit: contain; }
    .tb-logo .title-serif { font-size: 14px; margin-left: 0; color: var(--text-secondary); font-weight: 400; }
    .tb-sep { color: var(--border-strong); font-weight: 300; }

    .back-btn {
      margin-left: auto;
      height: 30px; padding: 0 12px;
      border: 1px solid var(--border-default); border-radius: var(--r-md);
      background: var(--surface-card); color: var(--text-secondary);
      font: 500 var(--fs-xs) / 1 var(--font-sans);
      cursor: pointer; transition: all 120ms ease;
    }
    .back-btn:hover { border-color: var(--border-strong); color: var(--text-primary); background: var(--surface-hover); }

    .world-select {
      max-width: 240px; height: 30px;
      padding: 0 30px 0 10px;
      border: 1px solid var(--border-default); border-radius: var(--r-md);
      background-color: var(--surface-card); color: var(--text-primary);
      font: 500 var(--fs-xs) / 1 var(--font-sans);
      cursor: pointer;
    }
    .world-select:hover { border-color: var(--border-strong); }


    /* MAIN SPLIT */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* LEFT: AGENT CONSOLE */
    #console-pane {

      width: 55%; border-right: 1px solid var(--border-default);
      display: flex; flex-direction: column; overflow: hidden;
      background: var(--surface-card);
    }
    #console-header {
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
      padding: 12px 16px; border-bottom: 1px solid var(--border-subtle);
      background: var(--surface-sunken);
    }
    .pane-title {
      font-size: 11px; color: var(--text-tertiary);
      letter-spacing: 0.04em; text-transform: uppercase; flex: 1;
      font-family: var(--font-sans); font-weight: 500;

    }
    .pane-title { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; flex: 1; }
    .run-btn {

      height: 30px; padding: 0 14px;
      border: 1px solid var(--accent); border-radius: var(--r-md);
      background: var(--accent); color: #fff;
      font: 500 var(--fs-xs) / 1 var(--font-sans);
      cursor: pointer; transition: all 120ms ease;
    }
    .run-btn:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
    .run-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .stop-btn {
      height: 30px; padding: 0 14px;
      border: 1px solid var(--danger-border); border-radius: var(--r-md);
      background: var(--surface-card); color: var(--danger);
      font: 500 var(--fs-xs) / 1 var(--font-sans);
      cursor: pointer; display: none;
    }
    .stop-btn:hover:not(:disabled) { background: var(--danger-soft); }

    .step-counter { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }

    #console-log {
      flex: 1; overflow-y: auto; padding: 14px 18px;
      display: flex; flex-direction: column; gap: 4px;
      background: var(--surface-sunken);
    }

    .log-entry { display: flex; gap: 10px; align-items: flex-start; line-height: 1.6; }
    .log-ts {
      color: var(--text-tertiary); font-size: 11px;
      min-width: 56px; padding-top: 1px; flex-shrink: 0;
      font-family: var(--font-mono);
    }
    .log-msg { flex: 1; font-size: 12px; font-family: var(--font-mono); }
    .log-system  { color: var(--text-tertiary); font-style: italic; }
    .log-think   { color: var(--info); }
    .log-tool    { color: var(--warning); }
    .log-result  { color: var(--text-secondary); }
    .log-output  { color: var(--success); font-weight: 500; }
    .log-error   { color: var(--danger); }

    .tool-call {
      background: var(--warning-soft); border: 1px solid var(--warning-border);
      border-radius: var(--r-sm); padding: 8px 10px; margin: 2px 0;
      font-size: 11px; color: var(--warning); font-family: var(--font-mono);

    }
    .tool-call.write { background: var(--green-bg); border-color: #1a3d28; color: var(--green); }
    .tool-result {

      background: var(--surface-card); border: 1px solid var(--border-default);
      border-radius: var(--r-sm); padding: 8px 10px; margin: 2px 0;
      font-size: 11px; color: var(--text-secondary); max-height: 140px;
      overflow-y: auto; white-space: pre-wrap; word-break: break-all;
      font-family: var(--font-mono);
    }

    #score-pane {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: var(--surface-card);
    }
    #score-header {
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
      padding: 12px 16px; border-bottom: 1px solid var(--border-subtle);
      background: var(--surface-sunken);
    }
    #score-content { flex: 1; overflow-y: auto; padding: 18px; background: var(--surface-sunken); }

    #files-view { flex: 1; display: none; overflow: hidden; background: var(--surface-sunken); }
    #files-view.visible { display: flex; }
    #dir-tree {
      width: 220px; min-width: 220px; overflow-y: auto;
      background: var(--surface-card); border-right: 1px solid var(--border-default);
      padding: 8px 0;
    }
    #dir-viewer { flex: 1; overflow-y: auto; padding: 18px; }
    .dt-folder {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; cursor: pointer; font-size: 12px;
      color: var(--text-tertiary); user-select: none;
    }
    .dt-folder:hover { color: var(--text-secondary); background: var(--surface-hover); }
    .dt-toggle { font-size: 9px; min-width: 10px; }
    .dt-folder-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dt-file {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px 5px 0; cursor: pointer; font-size: 12px;
      color: var(--text-tertiary); border-left: 2px solid transparent;
      user-select: none; transition: background 100ms ease, color 100ms ease;
    }
    .dt-file:hover { background: var(--surface-hover); color: var(--text-secondary); }
    .dt-file.active { background: var(--accent-soft); color: var(--accent); border-left-color: var(--accent); }
    .dt-file-icon { font-size: 10px; min-width: 14px; text-align: center; }
    .dt-file.type-policy .dt-file-icon { color: var(--info); }
    .dt-file.type-invoice .dt-file-icon { color: var(--warning); }
    .dt-file.type-ledger .dt-file-icon { color: var(--success); }
    .dt-file.type-profile .dt-file-icon { color: var(--purple); }
    .dt-file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fv-label {
      font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.04em;
      text-transform: uppercase; margin-bottom: 12px; font-weight: 500;
    }
    .fv-type {
      display: inline-flex; align-items: center; font-size: 11px;
      padding: 2px 8px; border-radius: var(--r-pill);
      font-weight: 500; margin-bottom: 10px;
    }
    .fv-policy { background: var(--info-soft); color: var(--info); border: 1px solid var(--info-border); }
    .fv-profile { background: var(--purple-bg); color: var(--purple); border: 1px solid var(--purple-border); }
    .fv-invoice { background: var(--warning-soft); color: var(--warning); border: 1px solid var(--warning-border); }
    .fv-ledger { background: var(--success-soft); color: var(--success); border: 1px solid var(--success-border); }
    .fv-prose {
      background: var(--surface-card); border: 1px solid var(--border-default);
      border-radius: var(--r-md); padding: 14px 16px; font-size: 12px;
      line-height: 1.7; color: var(--text-secondary); white-space: pre-wrap;
      word-break: break-word;
    }
    .fv-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 180px; gap: 8px;
      color: var(--text-tertiary); text-align: center;
    }
    .fv-data-table { width: 100%; border-collapse: collapse; font-size: 12px; background: var(--surface-card); }
    .fv-data-table th {
      text-align: left; padding: 7px 10px; color: var(--text-tertiary);
      font-weight: 500; font-size: 11px; text-transform: uppercase;
      border-bottom: 1px solid var(--border-default); background: var(--surface-sunken);
    }
    .fv-data-table td { padding: 7px 10px; border-bottom: 1px solid var(--border-subtle); color: var(--text-primary); }
    .fv-data-table tr:last-child td { border-bottom: none; }


    .score-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 10px;

      color: var(--text-tertiary); text-align: center;
    }
    .score-placeholder .big { font-size: 36px; margin-bottom: 8px; color: var(--accent); opacity: 0.4; }

    .metrics-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .metric-card {
      flex: 1; min-width: 110px;
      background: var(--surface-card); border: 1px solid var(--border-default);
      border-radius: var(--r-md); padding: 12px 14px;
    }
    .metric-label {
      font-size: 11px; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;
      font-weight: 500;
    }
    .metric-value {
      font-size: 22px; font-weight: 600; color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .mv-green { color: var(--success); }
    .mv-amber { color: var(--warning); }
    .mv-red   { color: var(--danger); }


    .rubric-score-item {
      display: flex; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle); align-items: flex-start;
    }
    .rubric-score-item:last-child { border-bottom: none; }
    .rs-icon { font-size: 14px; min-width: 18px; padding-top: 1px; }
    .rs-body { flex: 1; }

    .rs-text { font-size: 13px; color: var(--text-primary); line-height: 1.5; margin-bottom: 4px; }
    .rs-reasoning { font-size: 12px; color: var(--text-tertiary); line-height: 1.5; }
    .rs-type {
      display: inline-flex; align-items: center;
      font-size: 11px; padding: 2px 8px;
      border-radius: var(--r-pill); font-weight: 500;
      letter-spacing: 0; text-transform: none;
    }
    .rst-det { background: var(--success-soft); color: var(--success); border: 1px solid var(--success-border); }
    .rst-llm { background: var(--info-soft); color: var(--info); border: 1px solid var(--info-border); }
    .rst-neg { background: var(--danger-soft); color: var(--danger); border: 1px solid var(--danger-border); }

    .section-label {
      font-size: 11px; color: var(--text-tertiary);
      letter-spacing: 0.04em; text-transform: uppercase;
      margin-bottom: 12px; font-weight: 500;
    }

    .agent-output-box {
      background: var(--surface-card); border: 1px solid var(--border-default);
      border-radius: var(--r-md); padding: 14px; font-size: 12px;
      line-height: 1.7; color: var(--text-secondary); margin-bottom: 16px;
      max-height: 300px; overflow-y: auto; white-space: pre-wrap;
      font-family: var(--font-mono);

    }
  </style>
</head>
<body>
<div id="root">
  <div id="topbar">

    <span class="tb-logo">
      <img src="/assets/symbal-logo.png" alt="" class="tb-logo-img" width="22" height="22" />
      Symbal Accounting <span class="title-serif">Apex</span>
    </span>
    <span class="tb-sep">/</span>
    <span style="color:var(--text-secondary);font-weight:500;white-space:nowrap">Agent runner</span>
    <span class="tb-sep">·</span>
    <select id="world-select" class="world-select" onchange="selectWorld(this.value)" aria-label="Select world"></select>
    <span id="world-name" style="display:none"></span>
    <select id="ai-provider-select" class="world-select" onchange="setAiProvider(this.value)" aria-label="Select AI provider">
      <option value="anthropic">Anthropic</option>
      <option value="openai">OpenAI</option>
    </select>
    <input id="ai-model-input" class="world-select" type="text" oninput="setAiModel(this.value)" aria-label="Model" placeholder="Model" />
    <button type="button" class="back-btn" onclick="window.location.href='/'">← Back to viewer</button>

  </div>
  <div id="main">
    <div id="console-pane">
      <div id="console-header">
        <span class="pane-title">Agent console</span>
        <span class="step-counter" id="step-counter"></span>
        <button class="run-btn" id="run-btn" onclick="runAgent()">▶ Run agent</button>
        <button class="stop-btn" id="stop-btn" onclick="stopAgent()">■ Stop</button>
      </div>
      <div id="console-log">
        <div class="log-entry">
          <span class="log-ts">--:--</span>
          <span class="log-msg log-system">Agent ready. Press Run to start.</span>
        </div>
      </div>
    </div>

    <div id="score-pane">
      <div id="score-header">
        <span class="pane-title">Rubric score</span>

      </div>
      <div id="files-view">
        <div id="dir-tree"></div>
        <div id="dir-viewer">
          <div class="fv-empty">
            <div style="font-size:24px;margin-bottom:6px">◫</div>
            <p style="font-size:11px;color:var(--text2)">Select a file to view</p>
          </div>
        </div>
      </div>
      <div id="score-content" class="visible">
        <div class="score-placeholder">

          <div class="big">◎</div>
          <p style="font-size:14px;color:var(--text-secondary)">Run the agent to see scores</p>
          <p style="font-size:12px">Rubric criteria are evaluated automatically when the run finishes.</p>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ── WORLD STATE ───────────────────────────────

let WORLD = null;
let aborted = false;
let stepCount = 0;

// Track writes so we can show them in scoring
let ledgerWrites = [];

function loadWorld() {
  try {
    const stored = sessionStorage.getItem('apex_active_world');
    if (stored) { WORLD = JSON.parse(stored); return; }
  } catch(e) {}
  WORLD = STATIC_WORLD;
}

// ── VIRTUAL FILE SYSTEM ───────────────────────

// Returns the mutable files array (agent writes mutate this in-memory)
function getFS() {
  const map = {};
  for (const f of WORLD.files) map[f.path] = f;
  return map;
}

// List files/dirs at a given path (empty string = root)
function vfsListFiles(dirPath) {
  const prefix = dirPath ? dirPath.replace(/\/?$/, '/') : '';
  const entries = new Set();
  for (const f of WORLD.files) {
    if (!prefix || f.path.startsWith(prefix)) {
      const rest = prefix ? f.path.slice(prefix.length) : f.path;
      const firstSeg = rest.split('/')[0];
      if (firstSeg) {
        // Is there more depth?
        const isDir = rest.includes('/') && rest.split('/').length > 1;
        entries.add(isDir ? firstSeg + '/' : firstSeg);
      }
    }
  }
  if (entries.size === 0) return `No files found at path: "${dirPath || '/'}"`;
  return [...entries].sort().join('\n');
}

// Read a file by path
function vfsReadFile(filePath) {
  const cleanPath = filePath.trim().replace(/^\//, '');
  const fs = getFS();
  const f = fs[cleanPath];
  if (!f) {
    // Try to give a helpful listing if it looks like a directory
    const asDir = vfsListFiles(cleanPath);
    if (asDir && !asDir.startsWith('No files')) {
      return `"${cleanPath}" is a directory. Contents:\n${asDir}`;
    }
    return `ERROR: File not found: "${cleanPath}"\n\nTry list_files to see available paths.`;
  }
  return f.content || '(empty)';
}

// Write to a ledger file
function vfsWriteFile(filePath, content) {
  const cleanPath = filePath.trim().replace(/^\//, '');
  const fs = getFS();
  const f = fs[cleanPath];
  if (!f) return `ERROR: File not found: "${cleanPath}"`;
  if (f.type !== 'ledger') return `ERROR: write_file can only write to ledger files. "${cleanPath}" is type "${f.type}".`;
  f.content = content;
  ledgerWrites.push({ path: cleanPath, content });
  // Refresh tree dot indicators; if this file is open, re-render it live
  refreshDirTree();
  if (dirActivePath === cleanPath) {
    document.getElementById('dir-viewer').innerHTML = renderDirFileContent(f);
  }
  return `OK: Written to ${cleanPath} (${content.split('\n').length} lines)`;
}

// ── TOOLS ─────────────────────────────────────

const TOOLS = [
  {
    name: 'list_files',
    description: 'List files and directories at a given path in the company directory. Returns direct children only. Use an empty path or "/" to list the root.',
    input_schema: {
      type: 'object',
      properties: {
        path: {
          type: 'string',
          description: 'Directory path to list. Use empty string or "/" for root. Examples: "engineering/", "marketing/tom_walsh/"'
        }
      },
      required: []
    }
  },
  {
    name: 'read_file',
    description: 'Read the full contents of a file at the given path.',
    input_schema: {
      type: 'object',
      properties: {
        path: {
          type: 'string',
          description: 'Full file path. Examples: "company_policy.pdf", "engineering/jordan_kim/profile.txt", "operations/team_invoices/INV-OPS-401.pdf"'
        }
      },
      required: ['path']
    }
  },
  {
    name: 'write_file',
    description: 'Write content to a ledger file (CSV format). Ledgers track invoice processing decisions. This is how you record your work — approved, rejected, and held invoices must be logged in the appropriate ledger.',
    input_schema: {
      type: 'object',
      properties: {
        path: {
          type: 'string',
          description: 'Path to the ledger file. Examples: "company_ledger.csv", "engineering/team_ledger.csv", "marketing/tom_walsh/user_ledger.csv"'
        },
        content: {
          type: 'string',
          description: 'Full CSV content to write. Must include header row: Date,Description,Amount,Category,Invoice Ref,Approved By,Status'
        }
      },
      required: ['path', 'content']
    }
  }
];

// ── LOGGING ───────────────────────────────────

function ts() {
  const d = new Date();
  return `${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function log(msg, cls = 'log-system') {
  const el = document.getElementById('console-log');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-ts">${ts()}</span><span class="log-msg ${cls}">${msg}</span>`;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function logToolCall(name, input) {
  const el = document.getElementById('console-log');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  const isWrite = name === 'write_file';
  const detail = input.path ? ` — <em>${escHtml(input.path)}</em>` : '';
  entry.innerHTML = `
    <span class="log-ts">${ts()}</span>
    <div style="flex:1">
      <div class="tool-call${isWrite ? ' write' : ''}">
        ${isWrite ? '✎' : '⟳'} tool: <strong>${name}</strong>${detail}
      </div>
    </div>`;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function logToolResult(result) {
  const el = document.getElementById('console-log');
  const preview = result.length > 500 ? result.slice(0, 500) + '\n...[truncated]' : result;
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <span class="log-ts">${ts()}</span>
    <div style="flex:1">
      <div class="tool-result">${escHtml(preview)}</div>
    </div>`;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateStepCounter() {
  document.getElementById('step-counter').textContent = `step ${stepCount}`;
}

// ── AGENT LOOP ────────────────────────────────

let agentMessages = [];
let finalOutput   = null;

// Trim tool_result content in older messages to keep history small.
// The agent has already processed the content — we just need to preserve
// that it made the call, not re-send every file verbatim each turn.
function trimHistoryForAPI(messages) {
  const KEEP_FULL_LAST_N = 2; // keep last N user turns untruncated
  const MAX_RESULT_CHARS = 300;

  let userTurnsSeen = 0;
  // Count user turns from the end
  for (let i = messages.length - 1; i >= 0; i--) {
    if (messages[i].role === 'user') userTurnsSeen++;
  }

  let userTurnIdx = 0;
  return messages.map(m => {
    if (m.role === 'user') {
      userTurnIdx++;
      const isRecent = userTurnIdx > userTurnsSeen - KEEP_FULL_LAST_N;
      if (!isRecent && Array.isArray(m.content)) {
        return {
          ...m,
          content: m.content.map(block => {
            if (block.type === 'tool_result' && typeof block.content === 'string'
                && block.content.length > MAX_RESULT_CHARS) {
              return {
                ...block,
                content: block.content.slice(0, MAX_RESULT_CHARS) + '\n...[truncated]',
              };
            }
            return block;
          }),
        };
      }
    }
    return m;
  });
}

function getSystemPrompt() {
  const isAudit = WORLD && WORLD.meta.id && WORLD.meta.id.startsWith('APEX-AUD');
  if (isAudit) {
    return `You are an AI auditor working inside a virtual company file system. You have access to financial records, HR documents, contracts, and audit workpapers.

Your tools:
- list_files(path): list directory contents. Call with empty path for root.
- read_file(path): read any file by its full path.
- write_file(path, content): write CSV content to audit workpaper tabs.

Approach:
- Explore the full directory before drawing conclusions.
- Cross-reference all relevant source documents (financial statements, bank statements, payroll records, invoices, contracts).
- Document your findings and conclusions in the provided workpaper template.
- Flag any discrepancies with the file name and specific row or section where found.
- When all workpaper tabs are complete, end your turn with a brief summary and your audit opinion.`;
  }
  return `You are an AI agent working inside a company's invoice processing system. You have access to a virtual file directory containing policy documents, employee profiles, invoices, and ledgers.

Your tools:
- list_files(path): list directory contents. Call with empty path for root.
- read_file(path): read any file by its full path.
- write_file(path, content): write CSV content to ledger files to log your decisions.

Approach:
- Explore the full directory before making decisions.
- Read all relevant policy documents and apply them carefully.
- Log every invoice decision (approved, rejected, or held) in the appropriate ledger at the company, team, and user level.
- When you have processed all invoices and filled all ledgers, end your turn with a brief final summary.`;
}

async function callClaude(messages, attempt = 0) {
  const key = localStorage.getItem('apex_api_key');
  if (!key) throw new Error('No API key. Go back to the world viewer and enter your key first.');

  const res = await fetch('/agent', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': key },
    body: JSON.stringify({
      model:      'claude-sonnet-4-6',
      max_tokens: 4096,
      tools:      TOOLS,
      messages:   trimHistoryForAPI(messages),
      system: getSystemPrompt(),
    }),
  });

  if (res.status === 429 && attempt < 5) {
    const waitSecs = 65;
    log(`Rate limit hit — waiting ${waitSecs}s before retry (attempt ${attempt + 1}/5)...`, 'log-system');
    await new Promise(r => setTimeout(r, waitSecs * 1000));
    return callClaude(messages, attempt + 1);
  }

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${res.status}`);
  }
  return res.json();
}

async function runAgent() {
  if (!WORLD) { log('No world loaded.', 'log-error'); return; }

  aborted    = false;
  stepCount  = 0;
  finalOutput = null;
  agentMessages = [];
  ledgerWrites  = [];

  document.getElementById('run-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'inline-block';
  document.getElementById('console-log').innerHTML = '';
  document.getElementById('score-content').innerHTML =
    '<div class="score-placeholder"><div style="font-size:32px;margin-bottom:8px">◎</div><p style="font-size:12px;color:var(--text2)">Agent running...</p></div>';

  log(`World: ${WORLD.meta.company} — ${WORLD.meta.period}`, 'log-system');
  log('', 'log-system');

  const TASK = WORLD.meta.taskPrompt || 'You have been assigned to process outstanding invoices for this company. Review the directory and handle them appropriately.';

  agentMessages.push({ role: 'user', content: TASK });

  const MAX_STEPS = 40;

  try {
    while (stepCount < MAX_STEPS && !aborted) {
      stepCount++;
      updateStepCounter();

      const response = await callClaude(agentMessages);
      const content  = response.content || [];

      agentMessages.push({ role: 'assistant', content });

      const toolResults = [];
      let hasToolUse = false;
      let lastText = '';

      for (const block of content) {
        if (block.type === 'text' && block.text.trim()) {
          lastText = block.text.trim();
          // Show first 300 chars of thinking
          const preview = lastText.length > 300 ? lastText.slice(0, 300) + '...' : lastText;
          log(escHtml(preview), 'log-think');
        }

        if (block.type === 'tool_use') {
          hasToolUse = true;
          logToolCall(block.name, block.input);

          let result = '';

          if (block.name === 'list_files') {
            result = vfsListFiles(block.input.path || '');

          } else if (block.name === 'read_file') {
            result = vfsReadFile(block.input.path || '');

          } else if (block.name === 'write_file') {
            result = vfsWriteFile(block.input.path || '', block.input.content || '');
            if (result.startsWith('OK:')) {
              log(`Wrote to ledger: ${escHtml(block.input.path)}`, 'log-output');
            }
          }

          logToolResult(result);
          toolResults.push({ type: 'tool_result', tool_use_id: block.id, content: result });
        }
      }

      // Capture last text block as final output if agent ends without tools
      if (!hasToolUse) {
        finalOutput = lastText;
      }

      if (response.stop_reason === 'end_turn' && !hasToolUse) break;

      if (toolResults.length > 0) {
        agentMessages.push({ role: 'user', content: toolResults });
      }

      await new Promise(r => setTimeout(r, 200));
    }

    if (aborted) {
      log('Agent stopped by user.', 'log-error');
    } else {
      if (!finalOutput) {
        // Extract last text block from history
        for (let i = agentMessages.length - 1; i >= 0; i--) {
          const m = agentMessages[i];
          if (m.role === 'assistant' && Array.isArray(m.content)) {
            const txt = m.content.find(b => b.type === 'text');
            if (txt) { finalOutput = txt.text; break; }
          }
        }
      }
      log('', 'log-system');
      log('Agent finished. Evaluating rubric...', 'log-system');
      await scoreSubmission();
    }

  } catch (err) {
    log(`Error: ${err.message}`, 'log-error');
  } finally {
    document.getElementById('run-btn').style.display = 'inline-block';
    document.getElementById('stop-btn').style.display = 'none';
    document.getElementById('step-counter').textContent = `${stepCount} steps`;
  }
}

function stopAgent() { aborted = true; }

// ── SCORING ───────────────────────────────────

async function scoreSubmission() {
  const key    = localStorage.getItem('apex_api_key');
  const rubric = WORLD.rubric;

  // Reconstruct full agent output from message history
  const allText = agentMessages
    .filter(m => m.role === 'assistant')
    .flatMap(m => Array.isArray(m.content) ? m.content : [])
    .filter(b => b.type === 'text')
    .map(b => b.text)
    .join('\n---\n');

  const allToolCalls = agentMessages
    .flatMap(m => Array.isArray(m.content) ? m.content : [])
    .filter(b => b.type === 'tool_use')
    .map(b => `${b.name}(${JSON.stringify(b.input)})`)
    .join('\n');

  const ledgerSummary = ledgerWrites.length > 0
    ? ledgerWrites.map(w => `WROTE TO ${w.path}:\n${w.content}`).join('\n\n')
    : '(no ledger writes)';

  const isAudit = WORLD.meta.id && WORLD.meta.id.startsWith('APEX-AUD');
  const taskLabel = isAudit ? 'audit' : 'invoice processing';
  const writesLabel = isAudit ? 'WORKPAPER WRITES' : 'LEDGER WRITES';

  const scoringPrompt = `You are grading an AI agent's ${taskLabel} work. Respond with ONLY a JSON array — no preamble, no markdown.

WORLD: ${WORLD.meta.company} (${WORLD.meta.period})

RUBRIC:
${rubric.map((r,i) => `${i+1}. [${r.type}] ${r.text}`).join('\n')}

AGENT TOOL CALLS (all):
${allToolCalls}

${writesLabel}:
${ledgerSummary}

AGENT TEXT OUTPUT (all turns):
${allText.slice(0, 30000)}

Return a JSON array with one object per rubric criterion:
[{"n":1,"met":true,"reasoning":"..."},{"n":2,"met":false,"reasoning":"..."}]`;

  try {
    const res = await fetch('/agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key },
      body: JSON.stringify({
        model:      'claude-sonnet-4-6',
        max_tokens: 4096,
        messages:   [{ role: 'user', content: scoringPrompt }],
      }),
    });

    const data    = await res.json();
    const raw     = data.content?.find(b => b.type === 'text')?.text || '[]';
    const match   = raw.match(/\[[\s\S]*\]/);
    const scores  = JSON.parse(match ? match[0] : '[]');

    renderScore(scores);

  } catch (err) {
    log(`Scoring error: ${err.message}`, 'log-error');
    renderScore([]);
  }
}

async function generateWorldCritique() {
  const btn = document.getElementById('critique-btn');
  const box = document.getElementById('critique-box');
  if (!btn || !box) return;

  btn.disabled = true;
  btn.textContent = '◈ thinking...';
  box.innerHTML = '';

  const key = localStorage.getItem('apex_api_key');
  const isAudit = WORLD.meta.id && WORLD.meta.id.startsWith('APEX-AUD');
  const taskLabel = isAudit ? 'audit' : 'invoice processing';
  const scores  = window._lastScores || [];
  const rubric  = WORLD.rubric;

  const rubricWithResults = rubric.map(r => {
    const s = scores.find(x => x.n === r.n);
    const status = s ? (s.met ? 'PASSED' : 'FAILED') : 'UNKNOWN';
    return `[${status}] ${r.text}${s?.reasoning ? '\n  Judge reasoning: ' + s.reasoning : ''}`;
  }).join('\n\n');

  const fileList = WORLD.files.map(f => `${f.type.toUpperCase().padEnd(8)} ${f.path}`).join('\n');

  const critiquePrompt = `You are a benchmark designer reviewing an AI agent's performance on a ${taskLabel} world. Your job is to identify weaknesses in the world design and suggest concrete improvements to make it harder for future agents.

WORLD: ${WORLD.meta.company} (${WORLD.meta.period})

RUBRIC RESULTS (what the agent was graded on and how it did):
${rubricWithResults}

FILES IN THE WORLD:
${fileList}

AGENT WORKPAPER/LEDGER WRITES:
${window._lastLedgerSummary || '(none)'}

AGENT TEXT OUTPUT (excerpt):
${(window._lastAllText || '').slice(0, 8000)}

Based on the agent's performance, produce a critique structured as a JSON array. Each item should be one of four types:
- "easy": a task the agent passed too easily — what made it trivial and how to obfuscate it
- "broken": a task the agent failed for the wrong reason (bad world design, not genuine difficulty)
- "gap": something the world should test but currently doesn't
- "change": a specific, concrete change to an existing file or rubric item to increase difficulty

Return ONLY a JSON array, no preamble:
[{"type":"easy"|"broken"|"gap"|"change","criterion":N_or_null,"title":"short title","detail":"specific actionable suggestion"}]`;

  try {
    const res = await fetch('/agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key },
      body: JSON.stringify({
        model:      'claude-sonnet-4-6',
        max_tokens: 4096,
        messages:   [{ role: 'user', content: critiquePrompt }],
      }),
    });
    const data  = await res.json();
    const raw   = data.content?.find(b => b.type === 'text')?.text || '[]';
    const match = raw.match(/\[[\s\S]*\]/);
    const items = JSON.parse(match ? match[0] : '[]');

    if (!items.length) {
      box.innerHTML = '<div style="font-size:11px;color:var(--text3);margin-top:12px">No critique generated.</div>';
    } else {
      const tagClass = { easy: 'ctag-easy', broken: 'ctag-broken', gap: 'ctag-gap', change: 'ctag-change' };
      const rows = items.map(item => `
        <div class="critique-item">
          <div><span class="critique-tag ${tagClass[item.type] || 'ctag-gap'}">${escHtml(item.type)}</span>${item.criterion != null ? ` <span style="font-size:9px;color:var(--text3)">criterion ${item.criterion}</span>` : ''}</div>
          <div style="font-weight:600;margin-bottom:3px">${escHtml(item.title)}</div>
          <div style="color:var(--text3)">${escHtml(item.detail)}</div>
        </div>`).join('');

      box.innerHTML = `<div class="critique-box">
        <div class="section-label" style="margin-top:4px">world critique</div>
        ${rows}
      </div>`;
    }
  } catch(err) {
    box.innerHTML = `<div style="font-size:11px;color:var(--red);margin-top:12px">Critique error: ${escHtml(err.message)}</div>`;
  }

  btn.disabled = false;
  btn.textContent = '◈ critique world difficulty';
}

function renderScore(scores) {
  const rubric   = WORLD.rubric;
  const metCount = scores.filter(s => s.met).length;
  const total    = rubric.length;
  const pct      = total > 0 ? Math.round((metCount / total) * 100) : 0;
  const pctColor = pct >= 80 ? 'mv-green' : pct >= 50 ? 'mv-amber' : 'mv-red';

  const rubricRows = rubric.map(r => {
    const score = scores.find(s => s.n === r.n);
    const met   = score?.met;
    const icon  = met === true ? '✓' : met === false ? '✗' : '?';
    const iconColor = met === true ? 'color:var(--green)' : met === false ? 'color:var(--red)' : 'color:var(--text3)';
    return `
      <div class="rubric-score-item">
        <div class="rs-icon" style="${iconColor}">${icon}</div>
        <div class="rs-body">
          <div class="rs-text">${escHtml(r.text)}</div>
          ${score?.reasoning ? `<div class="rs-reasoning">${escHtml(score.reasoning)}</div>` : ''}
          <span class="rs-type rst-${r.type}">${r.label}</span>
        </div>
      </div>`;
  }).join('');

  const ledgerInfo = ledgerWrites.length > 0
    ? `<div class="ledger-writes">
         ✎ Agent wrote to ${ledgerWrites.length} ledger${ledgerWrites.length > 1 ? 's' : ''}:<br>
         ${ledgerWrites.map(w => `  ${escHtml(w.path)}`).join('<br>')}
       </div>`
    : `<div style="background:var(--amber-bg);border:1px solid #3d2e00;border-radius:4px;padding:10px 12px;margin-bottom:16px;font-size:11px;color:var(--amber)">
         ⚠ Agent did not write to any ledgers
       </div>`;

  document.getElementById('score-content').innerHTML = `
    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-label">score</div>
        <div class="metric-value ${pctColor}">${pct}%</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">criteria met</div>
        <div class="metric-value">${metCount}/${total}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">steps</div>
        <div class="metric-value">${stepCount}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">ledger writes</div>
        <div class="metric-value ${ledgerWrites.length > 0 ? 'mv-green' : 'mv-amber'}">${ledgerWrites.length}</div>
      </div>
    </div>

    ${ledgerInfo}

    ${finalOutput ? `
      <div class="section-label">agent summary</div>
      <div class="agent-output-box">${escHtml(finalOutput.slice(0, 1200))}</div>` : ''}

    <div class="section-label">rubric breakdown</div>
    ${rubricRows}

    <button class="critique-btn" id="critique-btn" onclick="generateWorldCritique()">◈ critique world difficulty</button>
    <div id="critique-box"></div>`;

  // Store scored data for critique
  window._lastScores      = scores;
  window._lastAllText     = allText;
  window._lastAllToolCalls = allToolCalls;
  window._lastLedgerSummary = ledgerSummary;
}

// ── FILE EXPLORER ─────────────────────────────

let dirExpanded = new Set(['', 'company_invoices', 'leadership',
  'engineering', 'engineering/team_invoices',
  'marketing', 'marketing/team_invoices',
  'operations', 'operations/team_invoices']);
let dirActivePath = null;

function fileIcon(type) {
  return { policy: '§', invoice: '▤', ledger: '▦', profile: '◉' }[type] || '▤';
}

function buildDirTreeData() {
  const root = {};
  for (const f of WORLD.files) {
    const parts = f.path.split('/');
    let node = root;
    for (let i = 0; i < parts.length - 1; i++) {
      const seg = parts[i];
      if (!node[seg]) node[seg] = { _isDir: true, _children: {} };
      node = node[seg]._children;
    }
    node[parts[parts.length - 1]] = { _isDir: false, _file: f };
  }
  return root;
}

function renderDirNode(node, depth, prefix) {
  let html = '';
  const indent = depth * 12;
  const entries = Object.entries(node).sort(([an, av], [bn, bv]) => {
    const aDir = !!av._isDir, bDir = !!bv._isDir;
    if (aDir && !bDir) return -1;
    if (!aDir && bDir) return 1;
    return an.localeCompare(bn);
  });
  for (const [name, val] of entries) {
    const fullPath = prefix ? prefix + '/' + name : name;
    if (val._isDir) {
      const open = dirExpanded.has(fullPath);
      html += `<div class="dt-folder" style="padding-left:${indent + 8}px" onclick="toggleDirFolder('${fullPath}')">
        <span class="dt-toggle">${open ? '▼' : '▶'}</span>
        <span>${open ? '◧' : '◫'}</span>
        <span class="dt-folder-name">${escHtml(name)}/</span>
      </div>`;
      if (open) html += renderDirNode(val._children, depth + 1, fullPath);
    } else {
      const f = val._file;
      const active = dirActivePath === f.path;
      // highlight ledger files that have been written to
      const written = ledgerWrites.some(w => w.path === f.path);
      html += `<div class="dt-file type-${f.type}${active ? ' active' : ''}"
        style="padding-left:${indent + 20}px"
        onclick="selectDirFile('${escHtml(f.path)}')">
        <span class="dt-file-icon">${fileIcon(f.type)}</span>
        <span class="dt-file-name">${escHtml(name)}${written && !active ? ' <span style="color:var(--green);font-size:8px">●</span>' : ''}</span>
      </div>`;
    }
  }
  return html;
}

function refreshDirTree() {
  if (!WORLD) return;
  document.getElementById('dir-tree').innerHTML = renderDirNode(buildDirTreeData(), 0, '');
}

function toggleDirFolder(path) {
  if (dirExpanded.has(path)) dirExpanded.delete(path);
  else dirExpanded.add(path);
  refreshDirTree();
}

function selectDirFile(path) {
  dirActivePath = path;
  refreshDirTree();
  const fs = getFS();
  const f = fs[path];
  if (!f) return;
  document.getElementById('dir-viewer').innerHTML = renderDirFileContent(f);
}

function renderDirFileContent(f) {
  const label = `<div class="fv-label">${escHtml(f.path)}</div>`;
  if (f.type === 'policy' || f.type === 'profile') {
    const cls = f.type === 'policy' ? 'fv-policy' : 'fv-profile';
    const tag = f.type === 'policy' ? 'POLICY' : 'PROFILE';
    return `${label}<span class="fv-type ${cls}">${tag}</span><div class="fv-prose">${escHtml(f.content || '')}</div>`;
  }
  if (f.type === 'invoice') {
    return `${label}<span class="fv-type fv-invoice">INVOICE</span><div class="fv-prose">${escHtml(f.content || '')}</div>`;
  }
  if (f.type === 'ledger') {
    const lines = (f.content || '').trim().split('\n').filter(Boolean);
    if (lines.length <= 1) {
      return `${label}<span class="fv-type fv-ledger">LEDGER</span>
        <div class="fv-empty">
          <div style="font-size:22px;margin-bottom:6px">▦</div>
          <p style="font-size:11px;color:var(--text2)">Empty — agent has not written here yet</p>
          <p style="font-size:10px;margin-top:4px;color:var(--text3)">${escHtml(lines[0] || '')}</p>
        </div>`;
    }
    const headers = lines[0].split(',').map(h => `<th>${escHtml(h.trim())}</th>`).join('');
    const rows = lines.slice(1).map(l =>
      '<tr>' + l.split(',').map(c => `<td>${escHtml(c.trim())}</td>`).join('') + '</tr>'
    ).join('');
    return `${label}<span class="fv-type fv-ledger">LEDGER — ${lines.length - 1} entries</span>
      <div style="overflow-x:auto"><table class="fv-data-table">
        <thead><tr>${headers}</tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  }
  return `${label}<div class="fv-prose">${escHtml(f.content || '')}</div>`;
}

function switchRightTab(tab) {
  document.getElementById('rtab-files').classList.toggle('active', tab === 'files');
  document.getElementById('rtab-rubric').classList.toggle('active', tab === 'rubric');
  document.getElementById('files-view').classList.toggle('visible', tab === 'files');
  document.getElementById('score-content').classList.toggle('visible', tab === 'rubric');
  if (tab === 'files') refreshDirTree();
}

// ── INIT ──────────────────────────────────────
loadWorld();
if (WORLD?.meta?.company) {
  document.getElementById('world-name').textContent = WORLD.meta.company;
}
refreshDirTree();
</script>
