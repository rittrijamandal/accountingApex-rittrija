<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYMBAL ACCOUNTING APEX — Agent Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f1f5f9;
      --bg2: #ffffff;
      --bg3: #f8fafc;
      --bg4: #e2e8f0;
      --border: #e2e8f0;
      --border2: #cbd5e1;
      --text: #0f172a;
      --text2: #64748b;
      --text3: #94a3b8;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-soft: #dbeafe;
      --accent-muted: #eff6ff;
      --amber: #b45309;
      --amber-bg: #fffbeb;
      --amber-border: #fde68a;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --red-border: #fecaca;
      --blue: #2563eb;
      --blue-bg: #eff6ff;
      --blue-border: #bfdbfe;
      --pos: #059669;
      --pos-bg: #ecfdf5;
      --pos-border: #a7f3d0;
      --mono: 'IBM Plex Mono', ui-monospace, monospace;
      --sans: 'Inter', system-ui, sans-serif;
      --green: var(--accent);
      --green-bg: var(--accent-soft);
    }
    html, body {
      height: 100%;
      background: linear-gradient(165deg, #f8fafc 0%, #e2e8f0 55%, #dbeafe 100%);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      overflow: hidden;
    }

    .title-serif {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      color: var(--accent);
      text-transform: none;
      letter-spacing: 0.02em;
    }

    #root { display: flex; flex-direction: column; height: 100vh; }

    #topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px; height: 48px; min-height: 48px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      font-size: 12px; flex-shrink: 0;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .tb-logo {
      font-weight: 600; color: var(--text); letter-spacing: 0.06em; font-size: 10px;
      text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px;
    }
    .tb-logo-img { display: block; width: 22px; height: 22px; object-fit: contain; }
    .tb-logo .title-serif { font-size: 12px; margin-left: 2px; }
    .tb-sep { color: var(--border2); }
    .back-btn {
      margin-left: auto; padding: 4px 12px;
      border: 1px solid var(--border2); border-radius: 0;
      background: var(--bg3); color: var(--text2);
      font-family: var(--sans); font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-muted); }

    #main { display: flex; flex: 1; overflow: hidden; }

    #console-pane {
      width: 55%; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg2);
    }
    #console-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg3); flex-shrink: 0;
    }
    .pane-title {
      font-size: 10px; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; flex: 1;
      font-family: var(--sans); font-weight: 600;
    }
    .run-btn {
      padding: 5px 16px; border: 1px solid var(--accent);
      border-radius: 0; background: var(--accent-soft); color: var(--accent);
      font-family: var(--sans); font-size: 10px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s;
    }
    .run-btn:hover:not(:disabled) { background: var(--accent-muted); border-color: var(--accent-hover); }
    .run-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .stop-btn {
      padding: 5px 16px; border: 1px solid var(--red);
      border-radius: 0; background: var(--red-bg); color: var(--red);
      font-family: var(--sans); font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em;
      cursor: pointer; display: none;
    }
    .step-counter { font-size: 10px; color: var(--text3); font-family: var(--mono); }

    #console-log {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 4px;
      background: var(--bg3);
    }
    #console-log::-webkit-scrollbar { width: 4px; }
    #console-log::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 0; }

    .log-entry { display: flex; gap: 10px; align-items: flex-start; line-height: 1.6; }
    .log-ts { color: var(--text3); font-size: 10px; min-width: 52px; padding-top: 1px; flex-shrink: 0; font-family: var(--mono); }
    .log-msg { flex: 1; font-size: 11px; font-family: var(--mono); }
    .log-system  { color: var(--text3); font-style: italic; }
    .log-think   { color: var(--blue); }
    .log-tool    { color: var(--amber); }
    .log-result  { color: var(--text2); }
    .log-output  { color: var(--pos); font-weight: 500; }
    .log-error   { color: var(--red); }

    .tool-call {
      background: var(--amber-bg); border: 1px solid var(--amber-border);
      border-radius: 0; padding: 6px 10px; margin: 2px 0;
      font-size: 10px; color: var(--amber); font-family: var(--mono);
    }
    .tool-result {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 0; padding: 6px 10px; margin: 2px 0;
      font-size: 10px; color: var(--text2); max-height: 120px;
      overflow-y: auto; white-space: pre-wrap; word-break: break-all;
      font-family: var(--mono);
    }

    #score-pane {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg2);
    }
    #score-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg3); flex-shrink: 0;
    }
    #score-content { flex: 1; overflow-y: auto; padding: 16px; background: var(--bg3); }
    #score-content::-webkit-scrollbar { width: 4px; }
    #score-content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 0; }

    .score-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 10px;
      color: var(--text3); text-align: center; font-family: var(--sans);
    }
    .score-placeholder .big { font-size: 32px; margin-bottom: 8px; color: var(--accent); opacity: 0.35; }

    .metrics-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .metric-card {
      flex: 1; min-width: 100px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 0; padding: 10px 12px;
    }
    .metric-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; font-family: var(--sans); }
    .metric-value { font-size: 18px; font-weight: 600; color: var(--text); font-family: var(--sans); }
    .mv-green { color: var(--pos); }
    .mv-amber { color: var(--amber); }
    .mv-red   { color: var(--red); }

    .rubric-score-item {
      display: flex; gap: 10px; padding: 10px 0;
      border-bottom: 1px solid var(--border); align-items: flex-start;
    }
    .rubric-score-item:last-child { border-bottom: none; }
    .rs-icon { font-size: 13px; min-width: 18px; padding-top: 1px; }
    .rs-body { flex: 1; }
    .rs-text { font-size: 11px; color: var(--text2); line-height: 1.5; margin-bottom: 4px; font-family: var(--sans); }
    .rs-reasoning { font-size: 10px; color: var(--text3); line-height: 1.5; font-style: italic; }
    .rs-type { font-size: 9px; padding: 2px 6px; border-radius: 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .rst-det { background: var(--pos-bg); color: var(--pos); border: 1px solid var(--pos-border); }
    .rst-llm { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
    .rst-neg { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

    .section-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; font-family: var(--sans); font-weight: 600; }

    .agent-output-box {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 0; padding: 12px; font-size: 11px;
      line-height: 1.7; color: var(--text2); margin-bottom: 16px;
      max-height: 300px; overflow-y: auto; white-space: pre-wrap;
      font-family: var(--mono);
    }
  </style>
</head>
<body>
<div id="root">
  <div id="topbar">
    <span class="tb-logo">
      <img src="/assets/symbal-logo.png" alt="" class="tb-logo-img" width="22" height="22" />
      SYMBAL ACCOUNTING <span class="title-serif">apex</span>
    </span>
    <span class="tb-sep">/</span>
    <span style="color:var(--text2);font-weight:500">Agent Runner</span>
    <span class="tb-sep">·</span>
    <span id="world-name" style="color:var(--text);font-size:11px;font-weight:600">Pixel &amp; Pine Studio</span>
    <button type="button" class="back-btn" onclick="window.location.href='/'">← World Viewer</button>
  </div>
  <div id="main">
    <div id="console-pane">
      <div id="console-header">
        <span class="pane-title">agent console</span>
        <span class="step-counter" id="step-counter"></span>
        <button class="run-btn" id="run-btn" onclick="runAgent()">▶ Run Agent</button>
        <button class="stop-btn" id="stop-btn" onclick="stopAgent()">■ Stop</button>
      </div>
      <div id="console-log">
        <div class="log-entry">
          <span class="log-ts">--:--</span>
          <span class="log-msg log-system">Agent ready. Press Run to start.</span>
        </div>
      </div>
    </div>
    <div id="score-pane">
      <div id="score-header">
        <span class="pane-title">rubric score</span>
      </div>
      <div id="score-content">
        <div class="score-placeholder">
          <div class="big">◎</div>
          <p style="font-size:12px;color:var(--text2)">Run the agent to see scores</p>
          <p style="font-size:10px">Rubric criteria will be evaluated<br>automatically when the agent finishes</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ── WORLD STATE ───────────────────────────────
// Uses the same WORLD data as main app — loaded from data.js
// On page load, try to read active world from sessionStorage (set by main app)
// Otherwise fall back to static Pixel & Pine data

let WORLD = null;
let aborted = false;
let stepCount = 0;

function loadWorld() {
  try {
    const stored = sessionStorage.getItem('apex_active_world');
    if (stored) {
      WORLD = JSON.parse(stored);
      return;
    }
  } catch(e) {}

  // Fallback to static data
  WORLD = {
    meta:               WORLD_META,
    transactions:       TRANSACTIONS,
    chartOfAccounts:    CHART_OF_ACCOUNTS,
    oldChartOfAccounts: OLD_CHART_OF_ACCOUNTS,
    expensePolicy:      EXPENSE_POLICY,
    oldExpensePolicy:   OLD_EXPENSE_POLICY,
    invoices:           INVOICES,
    rubric:             RUBRIC,
    taskPrompt:         null,
    ambiguityTypes:     null,
    misleadingFiles:    null,
  };
}

// ── FILE SYSTEM SIMULATION ────────────────────

function getFileSystem() {
  const invList = Array.isArray(WORLD.invoices)
    ? WORLD.invoices
    : Object.entries(WORLD.invoices).map(([id, v]) => ({ id, ...v }));

  return {
    'bank_statement.csv': {
      type: 'core',
      content: () => {
        const rows = WORLD.transactions.map(t =>
          `${t.date},${t.desc},${t.amount >= 0 ? '+' : ''}${t.amount.toFixed(2)}`
        ).join('\n');
        return `date,description,amount\n${rows}`;
      }
    },
    'chart_of_accounts.xlsx': {
      type: 'core',
      content: () => WORLD.chartOfAccounts.map(a => `${a.code} | ${a.name} | ${a.type}`).join('\n')
    },
    'expense_policy.pdf': {
      type: 'core',
      content: () => WORLD.expensePolicy.map(p => `${p.key}: ${p.val}`).join('\n')
    },
    'chart_of_accounts_prev.xlsx': {
      type: 'misleading',
      content: () => '[OUTDATED 2024]\n' + WORLD.oldChartOfAccounts.map(a => `${a.code} | ${a.name} | ${a.type}`).join('\n')
    },
    'expense_policy_prev.pdf': {
      type: 'misleading',
      content: () => '[OUTDATED POLICY v1]\n' + WORLD.oldExpensePolicy.map(p => `${p.key}: ${p.val}`).join('\n')
    },
    ...Object.fromEntries(invList.map(inv => [
      `${inv.invNum || inv.id}.pdf`,
      {
        type: inv.warn ? 'warning' : 'invoice',
        content: () => `Vendor: ${inv.vendor}\nInvoice #: ${inv.invNum}\nDate: ${inv.date}\nDescription: ${inv.desc}\nAmount: ${inv.amount}${inv.warn ? '\n\nNOTE: ' + inv.warn : ''}`
      }
    ])),
    'logo_final_v3.png':      { type: 'noise', content: () => '[binary image file — not useful for accounting]' },
    'meeting_notes.docx':     { type: 'noise', content: () => '[internal meeting notes — not relevant to accounting task]' },
    'vendor_contract.pdf':    { type: 'noise', content: () => '[vendor contract from 2022 — predates current period]' },
    'w9_form.pdf':            { type: 'noise', content: () => '[blank W-9 form template]' },
    'photos.zip':             { type: 'noise', content: () => '[archive of studio photos — not relevant]' },
    'proposal_draft_v2.docx': { type: 'noise', content: () => '[client proposal draft — not relevant to accounting]' },
    'task_01.txt':            { type: 'core',  content: () => getTaskPrompt() },
  };
}

function getTaskPrompt() {
  return WORLD.taskPrompt ||
    `You are working as a bookkeeper for ${WORLD.meta.name}. Review the bank statement and categorize each transaction using the current chart of accounts and expense policy. For each transaction: assign the correct account code. Flag ambiguous transactions, suspected duplicates, and personal expenses.`;
}

function listFiles() {
  return Object.keys(getFileSystem()).join('\n');
}

function readFile(filename) {
  const fs   = getFileSystem();
  const file = fs[filename.trim()];
  if (!file) return `ERROR: File "${filename}" not found. Available files:\n${listFiles()}`;
  return file.content();
}

// ── TOOLS ─────────────────────────────────────

const TOOLS = [
  {
    name: 'list_files',
    description: 'List all files available in the working directory',
    input_schema: { type: 'object', properties: {}, required: [] }
  },
  {
    name: 'read_file',
    description: 'Read the contents of a file',
    input_schema: {
      type: 'object',
      properties: {
        filename: { type: 'string', description: 'The filename to read' }
      },
      required: ['filename']
    }
  },
  {
    name: 'submit_categorizations',
    description: 'Submit your final work when you are done categorizing all transactions. Include your complete categorization for every transaction.',
    input_schema: {
      type: 'object',
      properties: {
        output: {
          type: 'string',
          description: 'Your complete categorization output. For each transaction include: date, description, amount, account code, account name, and any flags or notes. Also include a summary of findings at the end.'
        }
      },
      required: ['output']
    }
  }
];

// ── LOGGING ───────────────────────────────────

function ts() {
  const d = new Date();
  return `${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function log(msg, cls = 'log-system') {
  const el = document.getElementById('console-log');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-ts">${ts()}</span><span class="log-msg ${cls}">${msg}</span>`;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function logToolCall(name, input) {
  const el = document.getElementById('console-log');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <span class="log-ts">${ts()}</span>
    <div style="flex:1">
      <div class="tool-call">⟳ tool call: <strong>${name}</strong>${input.filename ? ` — "${input.filename}"` : ''}</div>
    </div>`;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function logToolResult(name, result) {
  const el = document.getElementById('console-log');
  const preview = result.length > 400 ? result.slice(0, 400) + '\n...[truncated]' : result;
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <span class="log-ts">${ts()}</span>
    <div style="flex:1">
      <div class="tool-result">${escHtml(preview)}</div>
    </div>`;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateStepCounter() {
  document.getElementById('step-counter').textContent = `step ${stepCount}`;
}

// ── AGENT LOOP ────────────────────────────────

let agentMessages = [];
let finalSubmission = null;

async function callClaude(messages) {
  const apiKey = localStorage.getItem('apex_api_key');
  if (!apiKey) throw new Error('No API key. Go back to the world viewer and enter your key first.');

  const res = await fetch('/api/test-grader', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
    body: JSON.stringify({
      model:      'claude-sonnet-4-20250514',
      max_tokens: 2000,
      tools:      TOOLS,
      messages,
      system: `You are an AI accounting agent completing a bookkeeping task. You have access to a virtual file system with accounting documents.

Your goal: complete the task in task_01.txt by reading the relevant files and submitting your categorizations using the submit_categorizations tool.

Important rules:
- Start by listing files to understand what's available
- Read the task file first, then gather the files you need
- When done, call submit_categorizations with your complete output`,
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${res.status}`);
  }
  return res.json();
}

async function runAgent() {
  if (!WORLD) { log('No world loaded.', 'log-error'); return; }

  aborted    = false;
  stepCount  = 0;
  finalSubmission = null;
  agentMessages   = [];

  document.getElementById('run-btn').disabled  = true;
  document.getElementById('stop-btn').style.display = 'inline-block';
  document.getElementById('console-log').innerHTML = '';
  document.getElementById('score-content').innerHTML = '<div class="score-placeholder"><div class="big">◎</div><p style="font-size:12px;color:var(--text2)">Agent running...</p></div>';

  log(`Starting agent on world: ${WORLD.meta.name}`, 'log-system');
  log(`Task: ${getTaskPrompt().slice(0, 120)}...`, 'log-system');
  log('', 'log-system');

  // Initial user message
  agentMessages.push({
    role: 'user',
    content: `You are working in the accounting directory for ${WORLD.meta.name}. ${getTaskPrompt()}\n\nStart by listing the available files.`
  });

  const MAX_STEPS = 20;

  try {
    while (stepCount < MAX_STEPS && !aborted) {
      stepCount++;
      updateStepCounter();

      const response = await callClaude(agentMessages);
      const content  = response.content || [];

      // Add assistant turn to history
      agentMessages.push({ role: 'assistant', content });

      // Process each content block
      const toolResults = [];
      let hasToolUse    = false;

      for (const block of content) {
        if (block.type === 'text' && block.text.trim()) {
          log(block.text.trim(), 'log-think');
        }

        if (block.type === 'tool_use') {
          hasToolUse = true;
          logToolCall(block.name, block.input);

          let result = '';

          if (block.name === 'list_files') {
            result = listFiles();
            logToolResult('list_files', result);

          } else if (block.name === 'read_file') {
            result = readFile(block.input.filename || '');
            const fileType = getFileSystem()[block.input.filename?.trim()]?.type || 'unknown';
            if (fileType === 'noise') {
              log(`Agent opened a noise file: ${block.input.filename}`, 'log-error');
            } else if (fileType === 'misleading') {
              log(`⚠ Agent opened misleading file: ${block.input.filename}`, 'log-error');
            }
            logToolResult('read_file', result);

          } else if (block.name === 'submit_categorizations') {
            finalSubmission = block.input;
            result = 'Categorizations submitted successfully.';
            log('Agent submitted final categorizations.', 'log-output');
            toolResults.push({ type: 'tool_result', tool_use_id: block.id, content: result });
            agentMessages.push({ role: 'user', content: toolResults });
            break;
          }

          toolResults.push({ type: 'tool_result', tool_use_id: block.id, content: result });
        }
      }

      // If agent submitted, we're done
      if (finalSubmission) break;

      // If stop_reason is end_turn with no tool use, agent is done thinking
      if (response.stop_reason === 'end_turn' && !hasToolUse) {
        log('Agent stopped without submitting. Forcing score...', 'log-error');
        break;
      }

      // Add tool results to next turn
      if (toolResults.length > 0) {
        agentMessages.push({ role: 'user', content: toolResults });
      }

      // Small delay so UI can breathe
      await new Promise(r => setTimeout(r, 300));
    }

    if (aborted) {
      log('Agent stopped by user.', 'log-error');
    } else if (stepCount >= MAX_STEPS) {
      log(`Max steps (${MAX_STEPS}) reached.`, 'log-error');
    } else {
      log('', 'log-system');
      log('Agent finished. Evaluating against rubric...', 'log-system');
      await scoreSubmission();
    }

  } catch (err) {
    log(`Error: ${err.message}`, 'log-error');
  } finally {
    document.getElementById('run-btn').disabled  = false;
    document.getElementById('stop-btn').style.display = 'none';
    document.getElementById('step-counter').textContent = `${stepCount} steps`;
  }
}

function stopAgent() {
  aborted = true;
}

// ── SCORING ───────────────────────────────────

async function scoreSubmission() {
  if (!finalSubmission) {
    renderScore([], null, 'Agent did not submit categorizations.');
    return;
  }

  // Debug: log what we actually got
  log(`DEBUG submission keys: ${Object.keys(finalSubmission).join(', ')}`, 'log-system');
  log(`DEBUG output length: ${finalSubmission.output?.length ?? 'undefined'}`, 'log-system');
  log(`DEBUG output preview: ${finalSubmission.output?.slice(0,120) ?? 'undefined'}`, 'log-system');

  const apiKey = localStorage.getItem('apex_api_key');
  const rubric = WORLD.rubric;

  const scoringPrompt = `You are grading an AI accounting agent's output against a rubric. Respond with ONLY a JSON array, nothing else. No preamble, no markdown, no explanation. Your entire response must be valid JSON starting with [ and ending with ].

WORLD: ${WORLD.meta.name} (${WORLD.meta.method}, ${WORLD.meta.period})

CHART OF ACCOUNTS (current):
${WORLD.chartOfAccounts.map(a => `${a.code} ${a.name}`).join('\n')}

RUBRIC CRITERIA:
${rubric.map((r,i) => `${i+1}. [${r.type}] ${r.text}`).join('\n')}

AGENT SUBMISSION:
${finalSubmission.output || '(empty)'}

Return a JSON array with one object per rubric criterion. Example format:
[{"n":1,"met":true,"reasoning":"explanation"},{"n":2,"met":false,"reasoning":"explanation"}]`;

  try {
    const res = await fetch('/api/test-grader', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
      body: JSON.stringify({
        model:      'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages:   [{ role: 'user', content: scoringPrompt }],
      }),
    });

    const data    = await res.json();
    const raw     = data.content?.find(b => b.type === 'text')?.text || '[]';
    // Extract JSON array even if there's surrounding text
    const match   = raw.match(/\[[\s\S]*\]/);
    const cleaned = match ? match[0] : '[]';
    const scores  = JSON.parse(cleaned);

    renderScore(scores, finalSubmission.output?.slice(0, 800));

  } catch (err) {
    log(`Scoring error: ${err.message}`, 'log-error');
    renderScore([], finalSubmission?.summary, err.message);
  }
}

function renderScore(scores, summary, errorMsg) {
  const rubric  = WORLD.rubric;
  const metCount = scores.filter(s => s.met).length;
  const total    = rubric.length;
  const pct      = total > 0 ? Math.round((metCount / total) * 100) : 0;

  const pctColor = pct >= 80 ? 'mv-green' : pct >= 50 ? 'mv-amber' : 'mv-red';

  const rubricRows = rubric.map(r => {
    const score = scores.find(s => s.n === r.n);
    const met   = score?.met;
    const icon  = met === true ? '✓' : met === false ? '✗' : '?';
    const iconColor = met === true ? 'color:var(--pos)' : met === false ? 'color:var(--red)' : 'color:var(--text3)';
    return `
      <div class="rubric-score-item">
        <div class="rs-icon" style="${iconColor}">${icon}</div>
        <div class="rs-body">
          <div class="rs-text">${escHtml(r.text)}</div>
          ${score?.reasoning ? `<div class="rs-reasoning">${escHtml(score.reasoning)}</div>` : ''}
          <span class="rs-type rst-${r.type}">${r.label}</span>
        </div>
      </div>`;
  }).join('');

  // Count noise files opened
  const fs = getFileSystem();
  const noiseOpened = agentMessages
    .flatMap(m => Array.isArray(m.content) ? m.content : [])
    .filter(b => b.type === 'tool_use' && b.name === 'read_file')
    .filter(b => fs[b.input?.filename?.trim()]?.type === 'noise')
    .length;

  const misleadOpened = agentMessages
    .flatMap(m => Array.isArray(m.content) ? m.content : [])
    .filter(b => b.type === 'tool_use' && b.name === 'read_file')
    .filter(b => fs[b.input?.filename?.trim()]?.type === 'misleading')
    .length;

  document.getElementById('score-content').innerHTML = `
    ${errorMsg ? `<div style="background:var(--red-bg);border:1px solid var(--red-border);border-radius:0;padding:10px 12px;margin-bottom:16px;font-size:11px;color:var(--red)">${escHtml(errorMsg)}</div>` : ''}

    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-label">score</div>
        <div class="metric-value ${pctColor}">${pct}%</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">criteria met</div>
        <div class="metric-value">${metCount}/${total}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">steps taken</div>
        <div class="metric-value">${stepCount}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">noise opened</div>
        <div class="metric-value ${noiseOpened > 0 ? 'mv-amber' : 'mv-green'}">${noiseOpened}</div>
      </div>
    </div>

    ${misleadOpened > 0 ? `
      <div style="background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:0;padding:10px 12px;margin-bottom:16px;font-size:11px;color:var(--amber)">
        ⚠ Agent opened ${misleadOpened} misleading file${misleadOpened > 1 ? 's' : ''} — may have used outdated data
      </div>` : ''}

    ${summary ? `
      <div class="section-label">agent summary</div>
      <div class="agent-output-box">${escHtml(summary)}</div>` : ''}

    <div class="section-label">rubric breakdown</div>
    ${rubricRows}`;
}

// ── INIT ──────────────────────────────────────
loadWorld();
if (WORLD?.meta?.name) {
  document.getElementById('world-name').textContent = WORLD.meta.name;
}
</script>
