<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin console — Accounting Apex</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    html, body { height: 100%; }

    #admin-app { height: 100vh; display: flex; flex-direction: column; }

    .admin-shell {
      flex: 1; min-height: 0;
      display: grid; grid-template-columns: 240px 1fr;
    }

    .admin-sidebar {
      border-right: 1px solid var(--border-default);
      background: var(--surface-card);
      display: flex; flex-direction: column; min-height: 0;
    }
    .admin-sidebar-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .admin-sidebar-head .brand {
      display: flex; align-items: center; gap: 10px;
    }
    .admin-sidebar-head .brand img { width: 26px; height: 26px; object-fit: contain; }
    .admin-sidebar-head .brand-kicker {
      font-size: 11px; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500;
    }
    .admin-sidebar-head .brand-name {
      font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    .admin-nav-list {
      padding: 12px 8px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .admin-nav {
      display: block; width: 100%; text-align: left;
      padding: 8px 12px;
      border: 0; background: transparent; border-radius: var(--r-md);
      font: 500 var(--fs-sm) / 1.4 var(--font-sans);
      color: var(--text-secondary); cursor: pointer;
      letter-spacing: 0; text-transform: none;
      transition: background 120ms ease, color 120ms ease;
    }
    .admin-nav:hover { background: var(--surface-hover); color: var(--text-primary); }
    .admin-nav.active {
      background: var(--accent-soft); color: var(--accent);
    }

    .admin-sidebar-foot {
      margin-top: auto;
      padding: 12px 8px;
      border-top: 1px solid var(--border-subtle);
      display: flex; flex-direction: column; gap: 6px;
    }
    .admin-sidebar-foot .btn-ghost { width: 100%; justify-content: flex-start; }

    .admin-content {
      min-height: 0; overflow: auto;
      background: var(--surface-app);
    }
    .admin-topbar {
      height: 56px; display: flex; align-items: center; gap: 10px;
      padding: 0 24px;
      background: var(--surface-card);
      border-bottom: 1px solid var(--border-default);
      position: sticky; top: 0; z-index: 5;
    }
    .admin-topbar input.search {
      flex: 1; max-width: 480px;
    }
    .admin-topbar .who {
      margin-left: auto;
      font-size: 13px; color: var(--text-secondary);
      white-space: nowrap;
    }

    .admin-main { padding: 24px; display: flex; flex-direction: column; gap: 20px; }

    .admin-section { display: none; }
    .admin-section.is-active { display: block; }

    .stat-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .stat-card {
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      border-radius: var(--r-lg);
      padding: 18px 20px;
      box-shadow: var(--shadow-xs);
    }
    .stat-label {
      font-size: 12px; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.04em;
      font-weight: 500;
    }
    .stat-value {
      margin-top: 8px;
      font-size: 28px; font-weight: 600; letter-spacing: -0.02em;
      color: var(--text-primary); line-height: 1.1;
    }
    .stat-value.pos { color: var(--success); }
    .stat-value.warn { color: var(--warning); }
    .stat-value.danger { color: var(--danger); }
    .stat-value.accent { color: var(--accent); }

    .admin-card {
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-xs);
      overflow: hidden;
    }
    .admin-card-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 13px; font-weight: 600; color: var(--text-primary);
      letter-spacing: 0; text-transform: none;
    }

    .admin-table {
      width: 100%; border-collapse: collapse;
      font-size: 13px;
    }
    .admin-table th {
      text-align: left; padding: 10px 14px;
      background: var(--surface-sunken);
      color: var(--text-tertiary); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500;
      border-bottom: 1px solid var(--border-default);
      white-space: nowrap;
    }
    .admin-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-primary); vertical-align: middle;
    }
    .admin-table tbody tr:last-child td { border-bottom: none; }
    .admin-table tbody tr:hover td { background: var(--surface-hover); }
    .admin-table .right { text-align: right; }
    .admin-table .muted { color: var(--text-tertiary); font-size: 12px; }

    .admin-table select.role-select {
      height: 30px; padding: 0 28px 0 10px; font-size: 12px;
    }

    .admin-table .row-action {
      display: inline-flex; align-items: center; justify-content: center;
      height: 28px; padding: 0 10px;
      border: 1px solid var(--border-default); border-radius: var(--r-sm);
      background: var(--surface-card); color: var(--text-secondary);
      font: 500 12px / 1 var(--font-sans);
      cursor: pointer; margin-left: 4px;
      transition: all 120ms ease;
    }
    .admin-table .row-action:hover {
      background: var(--surface-hover);
      border-color: var(--border-strong);
      color: var(--text-primary);
    }
    .admin-table .row-action.danger { color: var(--danger); }
    .admin-table .row-action.danger:hover { background: var(--danger-soft); border-color: var(--danger-border); color: var(--danger); }
    .admin-table .row-action.accent { color: var(--accent); }
    .admin-table .row-action.accent:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

    .reviewer-dot {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px;
      border: 1px solid var(--border-default);
      border-radius: var(--r-pill);
      font-size: 10px; font-weight: 600;
      color: var(--text-secondary); background: var(--surface-card);
      letter-spacing: 0; text-transform: uppercase;
    }

    .admin-empty {
      padding: 16px;
      color: var(--text-secondary); font-size: 13px;
    }

    .analytics-note {
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      border-radius: var(--r-md);
      padding: 14px;
      font-size: 13px; color: var(--text-secondary);
      line-height: 1.55;
    }

    @media (max-width: 880px) {
      .admin-shell { grid-template-columns: 1fr; }
      .admin-sidebar { border-right: 0; border-bottom: 1px solid var(--border-default); }
    }
  </style>
</head>
<body>
  <div id="admin-app"></div>
  <script type="module" src="/js/admin-dashboard.js"></script>
</body>
</html>
