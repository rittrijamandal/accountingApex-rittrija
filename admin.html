<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Accounting APEX</title>
  <link rel="stylesheet" href="auth-ui.css" />
</head>
<body>
  <div class="dashboard">
    <h1>Admin <span>dashboard</span></h1>
    <p>Signed in as <strong id="email"></strong>. Admins can open every area of the app; use Expert to author worlds, Grader to run agents against published worlds.</p>

    <p style="margin:18px 0 10px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em">Go to</p>
    <div class="row" style="flex-direction:column;align-items:stretch;gap:10px;max-width:420px">
      <a href="expert.html" class="btn" style="text-decoration:none;text-align:center;display:block;box-sizing:border-box">Expert — worlds &amp; editor</a>
      <a href="grader.html" class="btn btn-ghost" style="text-decoration:none;text-align:center;display:block;box-sizing:border-box;margin-top:0">Grader console</a>
      <a href="viewer.html" class="btn btn-ghost" style="text-decoration:none;text-align:center;display:block;box-sizing:border-box;margin-top:0">Sample world viewer (static demo)</a>
    </div>

    <div class="row" style="margin-top:22px">
      <button type="button" class="btn btn-inline" id="logout">Sign out</button>
    </div>
  </div>
  <script type="module">
    import { requireRoles } from './js/auth-guard.js';
    import { signOut } from './js/auth-core.js';

    const ctx = await requireRoles(['admin']);
    if (!ctx) return;
    document.getElementById('email').textContent = ctx.profile.email || ctx.session.user.email || ctx.profile.id;

    document.getElementById('logout').addEventListener('click', async () => {
      await signOut();
      window.location.href = '/login.html';
    });
  </script>
</body>
</html>
