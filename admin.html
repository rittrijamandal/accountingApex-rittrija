<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Console — Accounting APEX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          borderRadius: {
            none: '0',
            sm: '6px',
            DEFAULT: '7px',
            md: '8px',
            lg: '8px',
            xl: '8px',
            '2xl': '8px',
            '3xl': '8px',
            full: '999px',
          },
          colors: {
            apexBg: '#eef2f5',
            apexCard: '#ffffff',
            apexBorder: '#dce3ea',
            apexText: '#16202a',
            apexMuted: '#5f6f7f',
            apexAccent: '#2364aa',
            apexAccentSoft: '#e6f0fb',
            apexPos: '#0f766e',
            apexWarn: '#a15c16',
            apexDanger: '#c2413d',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .rounded-none { border-radius: 7px !important; }
    aside, header, section[id^="section-"], .admin-section > div, table { box-shadow: 0 1px 2px rgba(17,24,39,.04); }
    .admin-nav { text-transform: none; letter-spacing: 0; }
    button, input, select { min-height: 34px; }
    input:focus, select:focus, button:focus { box-shadow: 0 0 0 3px rgba(35,100,170,.14); }
  </style>
</head>
<body class="m-0 min-h-screen bg-apexBg text-apexText font-sans" style="background:radial-gradient(circle at 16% 0%, rgba(35,100,170,.10), transparent 30%),linear-gradient(180deg,#f8fafb 0%,#edf2f6 100%)">
  <div id="admin-app" class="h-screen"></div>
  <script type="module" src="/js/admin-dashboard.js"></script>
</body>
</html>
